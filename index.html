<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentFind</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RentFind">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-inner">
                <h1 id="appTitle" style="cursor:pointer" title="Refresh">RentFind</h1>
                <div class="header-controls" role="radiogroup" aria-label="View mode">
                <label class="filter-toggle" for="viewDefault">
                    <input id="viewDefault" type="radio" name="viewMode" value="default" checked>
                    <span>Default</span>
                </label>
                <label class="filter-toggle" for="viewPlanned">
                    <input id="viewPlanned" type="radio" name="viewMode" value="planned">
                    <span>Only planned inspections</span>
                </label>
                <label class="filter-toggle" for="viewClosed">
                    <input id="viewClosed" type="radio" name="viewMode" value="closed">
                    <span>Only closed ones</span>
                </label>
                </div>
            </div>
        </header>

        <!-- Status/State Region -->
        <div class="status-region">
            <!-- Loading State -->
            <div id="loadingState" class="state-box loading-state hidden">
                <div class="spinner"></div>
                <p>Loading data...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="state-box error-state hidden">
                <p class="error-message" id="errorMessage">Failed to load data.</p>
                <button id="retryButton" class="btn btn-primary">Retry</button>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="state-box empty-state hidden">
                <p>No results found.</p>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content-wrapper">
            <!-- List View -->
            <div class="list-container">
                <div id="listView" class="list-view hidden">
                    <ul id="itemList" class="item-list"></ul>
                </div>
            </div>

            <!-- Detail Panel (Mobile Slide-Up / Desktop Side Panel) -->
            <div id="detailPanel" class="detail-panel hidden">
                <div class="detail-header">
                    <div class="detail-actions">
                            <button id="editDetailButton" class="open-tab-icon hidden" type="button" aria-label="Edit listing" title="Edit listing">
                                <span aria-hidden="true">✎</span>
                                <span class="sr-only">Edit listing</span>
                            </button>
                        <a id="openDetailUrlButton" class="open-tab-icon hidden" href="#" target="_blank" rel="noopener noreferrer" aria-label="Open listing in new tab" title="Open in new tab">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-up-right" viewBox="0 0 16 16" aria-hidden="true">
                              <path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5"/>
                              <path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0z"/>
                            </svg>
                            <span class="sr-only">Open in new tab</span>
                        </a>
                        <a id="openMapButton" class="open-tab-icon hidden" href="#" target="_blank" rel="noopener noreferrer" aria-label="Open address in Google Maps" title="Open in Google Maps">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-geo-alt" viewBox="0 0 16 16" aria-hidden="true">
                                                            <path d="M12.166 8.94c-.524 1.062-1.234 2.12-1.96 3.07A32 32 0 0 1 8 14.58a32 32 0 0 1-2.206-2.57c-.726-.95-1.436-2.008-1.96-3.07C3.304 7.867 3 6.862 3 6a5 5 0 0 1 10 0c0 .862-.305 1.867-.834 2.94M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10"/>
                                                            <path d="M8 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4m0 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                            </svg>
                            <span class="sr-only">Open in Google Maps</span>
                        </a>
                    </div>
                    <button id="closeDetailButton" class="btn-close" aria-label="Close detail">
                        <span>&times;</span>
                    </button>
                </div>
                <div id="detailContent" class="detail-content"></div>
            </div>
        </div>

        <!-- Add Listing Mini Card -->
        <div id="addCardOverlay" class="add-card-overlay hidden" aria-hidden="true">
            <div class="add-card" role="dialog" aria-modal="true" aria-labelledby="addCardTitle">
                <div class="add-card-header">
                    <h2 id="addCardTitle">Add upcoming</h2>
                    <button id="dismissAddCardButton" class="btn-close add-card-close" aria-label="Dismiss add card">
                        <span>&times;</span>
                    </button>
                </div>
                <form id="addListingForm" class="add-card-form">
                    <label class="add-card-field">
                        <span>Id</span>
                        <input id="addId" name="Id" type="text" readonly aria-readonly="true">
                    </label>
                    <label class="add-card-field">
                        <span>Suburb</span>
                        <input id="addSuburb" name="Suburb" type="text" required>
                    </label>
                    <label class="add-card-field">
                        <span>Address</span>
                        <input id="addAddress" name="Address" type="text" required>
                    </label>
                    <label class="add-card-field">
                        <span>Rent per week</span>
                        <input id="addPerWeek" name="PerWeek" type="number" min="0" step="1" required>
                    </label>
                    <label class="add-card-field">
                        <span>Inspection time</span>
                        <input id="addDateInspectTime" name="DateInspectTime" type="text" placeholder="YYYYMMDDTHHMM">
                    </label>
                    <label class="add-card-field">
                        <span>Status</span>
                        <select id="addStatus" name="Status">
                            <option value="Inquired" selected>Inquired</option>
                            <option value="Planned Inspection">Planned Inspection</option>
                            <option value="Applied">Applied</option>
                            <option value="Closed">Closed</option>
                        </select>
                    </label>
                    <label class="add-card-field">
                        <span>Listing URL</span>
                        <input id="addUrl" name="URL" type="url" placeholder="https://...">
                    </label>
                    <label class="add-card-field">
                        <span>Note</span>
                        <textarea id="addNote" name="Note" rows="3" placeholder="Optional notes"></textarea>
                    </label>
                    <p id="addCardError" class="add-card-error hidden" role="alert"></p>
                    <div class="add-card-actions">
                        <button id="cancelAddCardButton" type="button" class="btn btn-secondary">Dismiss</button>
                        <button id="submitAddCardButton" type="submit" class="btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
